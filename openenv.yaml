name: delivery-route-env

description: Delivery Route Optimization Environment for AI agents

version: 1.0

entrypoint:
  module: env.environment
  class: DeliveryEnv

api:
  reset: /reset
  step: /step
  state: /state

tasks:
  - name: easy
    generator: tasks.easy:get_task
  - name: medium
    generator: tasks.medium:get_task
  - name: hard
    generator: tasks.hard:get_task

grader:
  module: graders.grader
  function: grade